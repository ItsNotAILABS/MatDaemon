<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">MatDaemon platform architecture</title>
  <desc id="desc">A product architecture diagram showing MatDaemon client surfaces, contracts, orchestration, compute backends, and proof gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#151925"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: #111827; stroke: #334155; stroke-width: 1.5; filter: url(#shadow); }
      .panel2 { fill: #0f172a; stroke: #334155; stroke-width: 1.5; }
      .chip { fill: #172033; stroke: #3b82f6; stroke-width: 1; }
      .compute { fill: #10251c; stroke: #22c55e; stroke-width: 1.2; }
      .proof { fill: #172133; stroke: #38bdf8; stroke-width: 1.2; }
      .title { font: 700 46px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 400 19px Inter, ui-sans-serif, system-ui, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .label { font: 700 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .small { font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .tiny { font: 500 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #94a3b8; letter-spacing: 0; }
      .line { stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); opacity: 0.9; }
      .accent { fill: url(#accent); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" width="1200" height="675" rx="0"/>
  <rect x="64" y="54" width="1072" height="567" rx="24" class="panel"/>
  <rect x="92" y="82" width="180" height="8" rx="4" class="accent"/>
  <text x="92" y="140" class="title">MatDaemon</text>
  <text x="92" y="174" class="subtitle">AI-native matrix compute platform: SDK, daemon, API, MCP, GitHub Action, benchmarks, CUDA.</text>

  <rect x="92" y="230" width="260" height="282" rx="14" class="panel2"/>
  <text x="118" y="270" class="label">Client Surfaces</text>
  <rect x="118" y="296" width="204" height="34" rx="8" class="chip"/><text x="136" y="318" class="small">Python SDK</text>
  <rect x="118" y="340" width="204" height="34" rx="8" class="chip"/><text x="136" y="362" class="small">CLI + local daemon</text>
  <rect x="118" y="384" width="204" height="34" rx="8" class="chip"/><text x="136" y="406" class="small">HTTP job API</text>
  <rect x="118" y="428" width="204" height="34" rx="8" class="chip"/><text x="136" y="450" class="small">MCP tool server</text>
  <rect x="118" y="472" width="204" height="34" rx="8" class="chip"/><text x="136" y="494" class="small">GitHub Action</text>

  <rect x="450" y="230" width="300" height="282" rx="14" class="panel2"/>
  <text x="476" y="270" class="label">Platform Contracts</text>
  <text x="476" y="309" class="small">/v1/platform manifest</text>
  <text x="476" y="342" class="small">/v1/jobs/matmul lifecycle</text>
  <text x="476" y="375" class="small">use-case registry</text>
  <text x="476" y="408" class="small">benchmark profiles</text>
  <text x="476" y="441" class="small">bounded MCP tools</text>
  <text x="476" y="474" class="small">package extras + Docker</text>

  <rect x="846" y="230" width="248" height="282" rx="14" class="panel2"/>
  <text x="872" y="270" class="label">Compute + Proof</text>
  <rect x="872" y="296" width="188" height="34" rx="8" class="compute"/><text x="890" y="318" class="small">auto routing</text>
  <rect x="872" y="340" width="188" height="34" rx="8" class="compute"/><text x="890" y="362" class="small">NumPy backend</text>
  <rect x="872" y="384" width="188" height="34" rx="8" class="compute"/><text x="890" y="406" class="small">tiled CPU backend</text>
  <rect x="872" y="428" width="188" height="34" rx="8" class="compute"/><text x="890" y="450" class="small">CUDA RawKernel</text>
  <rect x="872" y="472" width="188" height="34" rx="8" class="proof"/><text x="890" y="494" class="small">CI + benchmarks</text>

  <line x1="352" y1="371" x2="450" y2="371" class="line"/>
  <line x1="750" y1="371" x2="846" y2="371" class="line"/>

  <rect x="92" y="548" width="1002" height="44" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <text x="118" y="576" class="tiny">Ship posture: installable package, API service, MCP server, GitHub-callable benchmark runner, Docker surface, testable platform manifest, and proof artifacts.</text>
</svg>
