[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "matdaemon"
version = "0.1.0"
description = "High-Performance Asynchronous Vectorized Matrix Multiplication Daemon for AI and agentic systems"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "ITSNOTAILABS", email = "ITSNOTAILABS@OUTLOOK.com"}]  # ← update this
dependencies = ["numpy>=1.20"]
keywords = ["matrix-multiplication", "numpy", "daemon", "ai", "agentic-ai", "performance", "linear-algebra"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/YOURUSERNAME/matdaemon"
Repository = "https://github.com/YOURUSERNAME/matdaemon"

[tool.setuptools]
py-modules = ["matdaemon"]
